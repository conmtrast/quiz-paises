<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Quiz Países</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

#map{

height:450px;
width:700px;

margin:20px auto;

background:white;

border-radius:15px;

box-shadow:
0px 10px 30px rgba(0,0,0,0.2);

}

button{

display:block;

margin:10px auto;

padding:12px;

width:240px;

cursor:pointer;

font-size:16px;

border-radius:8px;

border:none;

background:#222;

color:white;

}

button:hover{

background:#444;

}

#resultado{

font-size:22px;
margin:15px;

}

</style>

</head>

<body>

<h1>Gabi's Guess the Country</h1>

<div id="map"></div>

<div id="opcoes"></div>

<p id="resultado"></p>

<button onclick="novaPergunta()">
Próximo País
</button>

<script>

// MAPA LIMPO

const map=L.map('map',{

zoomControl:false,
dragging:false,
scrollWheelZoom:false,
doubleClickZoom:false,
keyboard:false

}).setView([0,0],2);


// fundo invisível

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{opacity:0}
).addTo(map);



let camadaPais;

let paises=[];



// função segura para pegar nome

function nomePais(feature){

return (

feature.properties.ADMIN ||

feature.properties.name ||

feature.properties.NAME ||

feature.properties.NAME_EN ||

feature.properties.SOVEREIGNT ||

"País"

);

}



// carregar mundo inteiro

fetch(
"https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson"
)

.then(res=>res.json())

.then(data=>{

// filtra só países válidos

paises=data.features.filter(f=>nomePais(f)!=="País");

novaPergunta();

});



function shuffle(array){

return [...array].sort(()=>Math.random()-0.5);

}



function novaPergunta(){

if(!paises.length)return;


document.getElementById("resultado")
.innerText="";


// escolhe correto

const correto=

paises[
Math.floor(Math.random()*paises.length)
];


// remove anterior

if(camadaPais){

map.removeLayer(camadaPais);

}


// desenha silhueta

camadaPais=L.geoJSON(correto,{

style:{

color:"#000",
fillColor:"#000",
fillOpacity:1,
weight:1

}

}).addTo(map);


// centraliza

map.fitBounds(

camadaPais.getBounds(),

{padding:[40,40]}

);



// montar opções

const errados=shuffle(

paises.filter(

p=>nomePais(p)!==nomePais(correto)

)

).slice(0,4);


const respostas=

shuffle([

correto,

...errados

]);



const div=document.getElementById("opcoes");

div.innerHTML="";



respostas.forEach(opcao=>{

const botao=document.createElement("button");

botao.innerText=nomePais(opcao);


botao.onclick=()=>{

document.getElementById("resultado")
.innerText=

nomePais(opcao)===nomePais(correto)

?

"✅ Acertou!"

:

"❌ Errou!";

};

div.appendChild(botao);

});

}

</script>

</body>
</html>
