<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Quiz Países</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<style>

body{

font-family:Arial;
background:#f5f5f5;
text-align:center;

}

h1{

margin-top:20px;

}

#map{

height:450px;
width:700px;

margin:20px auto;

background:white;

border-radius:15px;

box-shadow:

0px 10px 30px rgba(0,0,0,0.2);

}


button{

display:block;

margin:10px auto;

padding:12px;

width:240px;

cursor:pointer;

font-size:16px;

border-radius:8px;

border:none;

background:#222;

color:white;

}

button:hover{

background:#444;

}

#resultado{

font-size:22px;
margin:15px;

}

</style>

</head>

<body>

<h1>Qual é o país?</h1>

<div id="map"></div>

<div id="opcoes"></div>

<p id="resultado"></p>

<button onclick="novaPergunta()">
Próximo País
</button>

<script>


// MAPA LIMPO

const map = L.map('map',{

zoomControl:false,

dragging:false,

scrollWheelZoom:false,

doubleClickZoom:false,

boxZoom:false,

keyboard:false,

tap:false

}).setView([0,0],2);


// fundo invisível (sem mapa)

L.tileLayer(

'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',

{opacity:0}

).addTo(map);



let camadaPais;



// LISTA

const paises=[

{name:"Brasil",code:"BRA"},

{name:"Argentina",code:"ARG"},

{name:"Chile",code:"CHL"},

{name:"Peru",code:"PER"},

{name:"Colômbia",code:"COL"},

{name:"México",code:"MEX"},

{name:"França",code:"FRA"},

{name:"Japão",code:"JPN"}

];



function shuffle(array){

return array.sort(()=>Math.random()-0.5);

}



function novaPergunta(){

document.getElementById("resultado")
.innerText="";

const correto=

paises[

Math.floor(

Math.random()*paises.length

)

];



fetch(

`https://raw.githubusercontent.com/johan/world.geo.json/master/countries/${correto.code}.geo.json`

)

.then(res=>res.json())

.then(data=>{

if(camadaPais){

map.removeLayer(camadaPais);

}


// silhueta estilizada

camadaPais=L.geoJSON(data,{

style:{

color:"#000",

fillColor:"#000",

fillOpacity:1,

weight:1

}

}).addTo(map);


// centraliza perfeito

map.fitBounds(

camadaPais.getBounds(),

{

padding:[40,40]

}

);

});



// opções

const opcoes=shuffle([

correto,

...shuffle(paises)

.filter(p=>p.code!==correto.code)

.slice(0,4)

]);


const div=document.getElementById("opcoes");

div.innerHTML="";



opcoes.forEach(opcao=>{

const botao=document.createElement("button");

botao.innerText=opcao.name;

botao.onclick=()=>{

document.getElementById("resultado")
.innerText=

opcao.code===correto.code

?

"✅ Acertou!"

:

"❌ Errou!";

};

div.appendChild(botao);

});

}



novaPergunta();

</script>

</body>
</html>
