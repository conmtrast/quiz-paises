<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quiz Países</title>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:50px;
}

button{
display:block;
margin:10px auto;
padding:10px;
width:200px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Qual é o país?</h1>

<h2 id="pergunta">🇧🇷</h2>

<div id="opcoes"></div>

<p id="resultado"></p>

<script>

const pergunta = {
resposta:"Brasil",
opcoes:[
"Argentina",
"Chile",
"Brasil",
"Peru",
"Colômbia"
]
};

const div = document.getElementById("opcoes");

pergunta.opcoes.forEach(opcao => {

const botao = document.createElement("button");

botao.innerText = opcao;

botao.onclick = () => {

if(opcao === pergunta.resposta){

document.getElementById("resultado").innerText="✅ Acertou!";

}else{

document.getElementById("resultado").innerText="❌ Errou!";

}

};

div.appendChild(botao);

});

</script>

</body>
</html>
