<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Quiz Países</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<style>

body{

font-family:Arial;
background:#f5f5f5;
text-align:center;

}

#menu{

margin-top:80px;

}

button{

margin:10px;
padding:14px;

width:240px;

font-size:16px;

cursor:pointer;

border-radius:8px;

border:none;

background:#222;

color:white;

}

#map{

height:450px;
width:700px;

margin:20px auto;

background:white;

border-radius:15px;

box-shadow:0px 10px 30px rgba(0,0,0,0.2);

display:none;

}

#hud{

font-size:20px;

display:none;

}

</style>

</head>

<body>

<h1>Quiz de Países 🌎</h1>

<div id="menu">

<h2>Escolha a dificuldade</h2>

<button onclick="iniciar('facil')">🟢 Fácil</button>

<button onclick="iniciar('medio')">🟡 Médio</button>

<button onclick="iniciar('dificil')">🔴 Difícil</button>

<button onclick="iniciar('todos')">🌎 Todos</button>

</div>

<div id="hud">

⏱️ Tempo:
<span id="tempo">10</span>

⭐ Pontos:
<span id="pontos">0</span>

</div>

<div id="map"></div>

<div id="opcoes"></div>

<p id="resultado"></p>

<script>

// ===== MAPA =====

const map=L.map('map',{

zoomControl:false,
dragging:false,
scrollWheelZoom:false,
doubleClickZoom:false

}).setView([0,0],2);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{opacity:0}
).addTo(map);



let paises=[];
let paisesAtivos=[];
let camadaPais;

let pontos=0;
let tempo=10;
let intervalo;



// ===== LISTAS =====

// FÁCIL

const facil=[

"Brazil","United States of America","Canada","Mexico","Argentina",

"France","Germany","Italy","Spain","Portugal","United Kingdom",

"Russia","China","India","Japan","South Korea",

"Australia","New Zealand",

"Egypt","South Africa","Saudi Arabia",

"Turkey","Iran","Israel",

"Indonesia","Thailand","Philippines"

];


// MÉDIO

const medio=[

"Poland","Romania","Hungary","Greece","Ukraine","Sweden",

"Norway","Finland","Morocco","Algeria","Nigeria","Kenya",

"Ghana","Peru","Chile","Colombia","Bolivia","Paraguay",

"Vietnam","Malaysia","Pakistan","Kazakhstan",

"United Arab Emirates","Qatar","Oman"

];


// DIFÍCIL

const dificil=[

"Lesotho","Eswatini","Liechtenstein","San Marino","Monaco",

"Nauru","Tuvalu","Kiribati","Palau","Marshall Islands",

"Seychelles","Comoros","Djibouti","Benin","Togo",

"Brunei","Bhutan","Laos","Timor-Leste",

"Slovenia","Luxembourg","Moldova"

];



function nomePais(f){

return(

f.properties.ADMIN ||

f.properties.name ||

f.properties.NAME ||

f.properties.NAME_EN ||

""

);

}



// ===== CARREGA MUNDO =====

fetch(
"https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson"
)

.then(r=>r.json())

.then(data=>{

paises=data.features;

});



function iniciar(nivel){

document.getElementById("menu").style.display="none";

document.getElementById("map").style.display="block";

document.getElementById("hud").style.display="block";


if(nivel==="todos"){

paisesAtivos=paises;

}else{

const lista=

nivel==="facil" ? facil :

nivel==="medio" ? medio :

dificil;


paisesAtivos=

paises.filter(p=>

lista.includes(nomePais(p))

);

}

novaPergunta();

}



function shuffle(a){

return[...a].sort(()=>Math.random()-0.5);

}



function iniciarTimer(correto){

clearInterval(intervalo);

tempo=10;

tempoSpan.innerText=tempo;


intervalo=setInterval(()=>{

tempo--;

tempoSpan.innerText=tempo;

if(tempo<=0){

clearInterval(intervalo);

resultado.innerText=

"⏰ Era "+nomePais(correto);

setTimeout(novaPergunta,2000);

}

},1000);

}



const tempoSpan=document.getElementById("tempo");

const resultado=document.getElementById("resultado");



function novaPergunta(){

resultado.innerText="";


const correto=

paisesAtivos[

Math.floor(Math.random()*paisesAtivos.length)

];


if(camadaPais){

map.removeLayer(camadaPais);

}


camadaPais=L.geoJSON(correto,{

style:{

color:"#000",
fillColor:"#000",
fillOpacity:1

}

}).addTo(map);


map.fitBounds(

camadaPais.getBounds(),

{padding:[40,40]}

);


const errados=

shuffle(

paisesAtivos.filter(

p=>nomePais(p)!==nomePais(correto)

)

).slice(0,4);


const respostas=

shuffle([

correto,

...errados

]);


const div=document.getElementById("opcoes");

div.innerHTML="";


respostas.forEach(opcao=>{

const b=document.createElement("button");

b.innerText=nomePais(opcao);


b.onclick=()=>{

clearInterval(intervalo);

if(nomePais(opcao)===nomePais(correto)){

pontos++;

resultado.innerText="✅ Acertou!";

}else{

resultado.innerText=

"❌ Era "+nomePais(correto);

}


document.getElementById("pontos")
.innerText=pontos;

setTimeout(novaPergunta,1500);

};

div.appendChild(b);

});


iniciarTimer(correto);

}

</script>

</body>
</html>
