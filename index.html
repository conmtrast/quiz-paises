<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Quiz Países</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<style>

body{
font-family:Arial;
text-align:center;
}

#map{
height:400px;
width:600px;
margin:auto;
}

button{

display:block;
margin:10px auto;
padding:10px;
width:220px;
cursor:pointer;

}

</style>

</head>

<body>

<h1>Qual é o país?</h1>

<div id="map"></div>

<div id="opcoes"></div>

<p id="resultado"></p>

<button onclick="novaPergunta()">
Próximo País
</button>

<script>

// MAPA

const map = L.map('map',{

zoomControl:false,
dragging:false,
scrollWheelZoom:false,
doubleClickZoom:false

}).setView([0,0],2);

L.tileLayer(

'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',

{opacity:0}

).addTo(map);


let camadaPais;


// LISTA DE PAÍSES

const paises=[

{name:"Brasil",code:"BRA"},

{name:"Argentina",code:"ARG"},

{name:"Chile",code:"CHL"},

{name:"Peru",code:"PER"},

{name:"Colômbia",code:"COL"},

{name:"México",code:"MEX"},

{name:"França",code:"FRA"},

{name:"Japão",code:"JPN"}

];


// embaralhar

function shuffle(array){

return array.sort(()=>Math.random()-0.5);

}


// NOVA PERGUNTA

function novaPergunta(){

document.getElementById("resultado")
.innerText="";

const correto=

paises[
Math.floor(
Math.random()*paises.length
)

];


// carregar GeoJSON

fetch(

`https://raw.githubusercontent.com/johan/world.geo.json/master/countries/${correto.code}.geo.json`

)

.then(res=>res.json())

.then(data=>{

if(camadaPais){

map.removeLayer(camadaPais);

}

camadaPais=L.geoJSON(data,{

style:{

color:"black",

fillColor:"black",

fillOpacity:1

}

}).addTo(map);

map.fitBounds(camadaPais.getBounds());

});


// montar opções

const opcoes=shuffle(

[

correto,

...shuffle(paises)
.filter(p=>p.code!==correto.code)
.slice(0,4)

]

);

const div=document.getElementById("opcoes");

div.innerHTML="";


opcoes.forEach(opcao=>{

const botao=document.createElement("button");

botao.innerText=opcao.name;

botao.onclick=()=>{

document.getElementById("resultado")
.innerText=

opcao.code===correto.code ?

"✅ Acertou!"

:

"❌ Errou!";

};

div.appendChild(botao);

});

}


// começa jogo

novaPergunta();

</script>

</body>
</html>
