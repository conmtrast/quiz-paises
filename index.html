<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quiz Países 🌎</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f3f6fa;
}

button{
margin:5px;
padding:10px 15px;
cursor:pointer;
border-radius:8px;
border:none;
background:#3b82f6;
color:white;
}

#map svg{

width:400px;
height:300px;

fill:black;

margin-top:20px;

}

</style>

</head>

<body>

<h1>🌎 Quiz de Países</h1>

<div id="menu">

<h2>Escolha dificuldade</h2>

<button onclick="startGame('facil')">
Fácil
</button>

<button onclick="startGame('medio')">
Médio
</button>

<button onclick="startGame('dificil')">
Difícil
</button>

</div>

<div id="game" style="display:none">

<div id="map"></div>

<div id="options"></div>

<p id="result"></p>

<button onclick="nextCountry()">

Próximo País

</button>

</div>

<script>

let countries = []

let currentCountry

let difficultyCountries


// ------------------------------
// níveis sugeridos
// ------------------------------

const facil = [

"Brazil",
"United States",
"Canada",
"Argentina",
"France",
"Germany",
"Spain",
"Italy",
"Portugal",
"United Kingdom",
"Japan",
"China",
"India",
"Australia",
"Mexico",
"Chile",
"Peru",
"South Africa",
"Egypt"

]


const medio = [

"Poland",
"Turkey",
"Ukraine",
"Thailand",
"Vietnam",
"Morocco",
"Greece",
"Norway",
"Sweden",
"Finland",
"New Zealand",
"Colombia",
"Venezuela",
"Bolivia",
"Romania",
"Hungary",
"Iran",
"Iraq"

]


// difícil = resto automaticamente

function startGame(level){

document.getElementById("menu").style.display="none"

document.getElementById("game").style.display="block"

fetchCountries(level)

}


async function fetchCountries(level){

const res = await fetch(

"https://restcountries.com/v3.1/all?fields=name,cca3"

)

countries = await res.json()


if(level=="facil"){

difficultyCountries=

countries.filter(c=>

facil.includes(c.name.common)

)

}

else if(level=="medio"){

difficultyCountries=

countries.filter(c=>

medio.includes(c.name.common)

)

}

else{

difficultyCountries=

countries.filter(c=>

!facil.includes(c.name.common)

&&

!medio.includes(c.name.common)

)

}


nextCountry()

}



async function loadMap(cca3){

try{

// base open source MUITO confiável

let url=

`https://cdn.jsdelivr.net/npm/svg-world-map@1/world/${cca3.toLowerCase()}.svg`

let res = await fetch(url)


if(!res.ok){

throw "erro"

}


let svg = await res.text()

document.getElementById("map").innerHTML=svg

}

catch(e){

document.getElementById("map").innerHTML=

"<p>Silhueta não encontrada 😢</p>"

}

}



function shuffle(arr){

return arr.sort(()=>0.5-Math.random())

}



async function nextCountry(){

document.getElementById("result").innerText=""

document.getElementById("options").innerHTML=""

document.getElementById("map").innerHTML="Carregando..."



currentCountry=

difficultyCountries[

Math.floor(

Math.random()*difficultyCountries.length

)

]


await loadMap(

currentCountry.cca3

)


// cria alternativas

let options = [

currentCountry,

...shuffle(countries)

.slice(0,4)

]


options=shuffle(options)



options.forEach(opt=>{

let btn=document.createElement("button")

btn.innerText=opt.name.common


btn.onclick=()=>{

if(opt.name.common===

currentCountry.name.common){

document.getElementById("result")

.innerText="✅ Acertou!"

}

else{

document.getElementById("result")

.innerText=

"❌ Era "

+

currentCountry.name.common

}

}


document.getElementById("options")

.appendChild(btn)

})

}

</script>

</body>

</html>
