<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Quiz Países</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<style>

body{
font-family:Arial;
text-align:center;
}

#map{
height:400px;
width:600px;
margin:auto;
}

button{
display:block;
margin:10px auto;
padding:10px;
width:200px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Qual é o país?</h1>

<div id="map"></div>

<div id="opcoes"></div>

<p id="resultado"></p>

<script>

// cria mapa vazio
const map = L.map('map',{
zoomControl:false,
dragging:false,
scrollWheelZoom:false,
doubleClickZoom:false
}).setView([0,0],2);

// fundo branco
L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
opacity:0
}
).addTo(map);


// Brasil GeoJSON (exemplo)
fetch("https://raw.githubusercontent.com/johan/world.geo.json/master/countries/BRA.geo.json")

.then(res => res.json())

.then(data => {

const pais = L.geoJSON(data,{

style:{
color:"black",
fillColor:"black",
fillOpacity:1
}

}).addTo(map);

map.fitBounds(pais.getBounds());

});


// QUIZ

const pergunta = {

resposta:"Brasil",

opcoes:[
"Argentina",
"Chile",
"Brasil",
"Peru",
"Colômbia"
]

};

const div = document.getElementById("opcoes");

pergunta.opcoes.forEach(opcao=>{

const botao=document.createElement("button");

botao.innerText=opcao;

botao.onclick=()=>{

document.getElementById("resultado")
.innerText=

opcao===pergunta.resposta ?

"✅ Acertou!" :

"❌ Errou!";

};

div.appendChild(botao);

});

</script>

</body>
</html>
