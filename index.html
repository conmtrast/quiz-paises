<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Quiz Países 🌎</title>

<style>

body{

font-family:Arial;

text-align:center;

background:#f3f6fa;

}

button{

margin:5px;

padding:10px 15px;

border-radius:8px;

border:none;

background:#3b82f6;

color:white;

cursor:pointer;

transition:0.2s;

}

button:hover{

transform:scale(1.05);

}

#map svg{

width:400px;

height:300px;

}

.country{

fill:black;

stroke:white;

stroke-width:0.5;

}

.correct{

background:#16a34a !important;

}

.wrong{

background:#dc2626 !important;

}

</style>

</head>

<body>

<h1>🌎 Quiz Países</h1>

<div id="menu">

<h2>Dificuldade</h2>

<button onclick="startGame('facil')">Fácil</button>

<button onclick="startGame('medio')">Médio</button>

<button onclick="startGame('dificil')">Difícil</button>

</div>

<div id="game" style="display:none">

<h3 id="score">

Pontuação: 0 | Pergunta 0

</h3>

<div id="map"></div>

<div id="options"></div>

<p id="result"></p>

<button onclick="nextCountry()">

Próximo País

</button>

</div>


<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

<script>

const facil=[

"Brazil","United States","Argentina","France",

"Germany","Spain","Italy","Portugal",

"Japan","China","India","Australia",

"Mexico","Chile","Egypt"

]

const medio=[

"Poland","Turkey","Ukraine",

"Thailand","Vietnam",

"Morocco","Greece",

"Norway","Sweden",

"Finland",

"New Zealand",

"Colombia",

"Romania"

]


let countries

let geoData

let difficultyCountries

let currentCountry


let score=0

let pergunta=0

let usados=[]



function shuffle(a){

return [...a].sort(()=>0.5-Math.random())

}


// iniciar

async function startGame(level){

document.getElementById("menu").style.display="none"

document.getElementById("game").style.display="block"

score=0

pergunta=0

usados=[]


await loadCountries()

await loadGeo()


if(level=="facil"){

difficultyCountries=

countries.filter(c=>

facil.includes(c.name.common))

}

else if(level=="medio"){

difficultyCountries=

countries.filter(c=>

medio.includes(c.name.common))

}

else{

difficultyCountries=

countries.filter(c=>

!facil.includes(c.name.common)

&&

!medio.includes(c.name.common))

}

nextCountry()

}


async function loadCountries(){

const res=

await fetch(

"https://restcountries.com/v3.1/all?fields=name,cca3")

countries=await res.json()

}


async function loadGeo(){

const res=

await fetch(

"https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json"

)

geoData=await res.json()

}


function drawCountry(iso){

const map=document.getElementById("map")

map.innerHTML=""

let feature=geoData.features.find(f=>

f.id===iso

)

if(!feature){

map.innerHTML="Silhueta não encontrada 😢"

return

}

const width=400

const height=300

const svg=d3.select("#map")

.append("svg")

.attr("width",width)

.attr("height",height)


const projection=

d3.geoMercator()

.fitSize([width,height],feature)


const path=

d3.geoPath()

.projection(projection)


svg.append("path")

.datum(feature)

.attr("class","country")

.attr("d",path)

}


// evita repetir país

function escolherPais(){

if(usados.length>=difficultyCountries.length){

usados=[]

}


let candidato


do{

candidato=

difficultyCountries[

Math.floor(

Math.random()

*

difficultyCountries.length

)

]

}

while(usados.includes(candidato.cca3))


usados.push(candidato.cca3)

return candidato

}


// próxima pergunta

function nextCountry(){

document.getElementById("result").innerText=""

document.getElementById("options").innerHTML=""

pergunta++


document.getElementById("score")

.innerText=

"Pontuação: "

+

score+

" | Pergunta "+

pergunta


currentCountry=

escolherPais()


drawCountry(

currentCountry.cca3

)


// alternativas

let wrong=

shuffle(

countries.filter(c=>

c.cca3!=currentCountry.cca3)

).slice(0,4)


let options=

shuffle([

currentCountry,

...wrong

])


options.forEach(opt=>{

let btn=document.createElement("button")

btn.innerText=

opt.name.common


btn.onclick=()=>{

document

.querySelectorAll("#options button")

.forEach(b=>b.disabled=true)


if(opt.cca3===

currentCountry.cca3){

btn.classList.add("correct")

score++

document.getElementById("result")

.innerText="✅ Acertou!"

}

else{

btn.classList.add("wrong")

document.getElementById("result")

.innerText=

"❌ Era "

+

currentCountry.name.common

}

}


document

.getElementById("options")

.appendChild(btn)

})

}

</script>

</body>

</html>
